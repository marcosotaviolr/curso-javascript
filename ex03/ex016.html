<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contar</title>
    <style>
        body {
            font: normal 15pt Arial;
            text-align: center;
            background-color: rgba(77, 169, 255, 0.836);
        }
        header {
            color: white;
        }
        section {
            width: 600px;
            height: auto;
            min-height: 200px;
            border-radius: 10px;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
            background-color: white;
            margin: auto;
            text-align: left;
            padding: 20px;
        }
        footer {
            color: white;
            margin: 20px;
        }
        #res {
            text-align: center;
            margin: 25px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Contador</h1>
    </header>
    <section>
        <p>Inicio: <input type="number" name="inicio" id="inicio"></p>
        <p>Fim: <input type="number" name="fim" id="fim"></p>
        <p>Passo: <input type="number" name="passo" id="passo"></p>
        <input type="button" value="Contar" onclick="contar()">
        <div id="resp"><p>Preparando a contagem...</p></div>
    </section>
    <footer>
        @marcosotaviolr
    </footer>

    <script>
        function contar() {
            let inicio = document.querySelector('#inicio')
            let fim = document.querySelector('#fim')
            let passo = document.querySelector('#passo')
            let resp = document.querySelector('#resp')

            resp.innerHTML = 'Contando...</br>'

            let ini = Number(inicio.value)
            let f = Number(fim.value)
            let pas = Number(passo.value)

            if (pas === 0) {
                window.alert('Impossível contar com passo = 0. Passo = 1')
                pas = 1
            }
            
            if (!inicio.value || !fim.value) {
                resp.innerHTML = 'Os campos estão vazios!!'
            } else if (ini < f) {
                for (let res = ini; res <= f; res = res + pas) {
                    resp.innerHTML += res + " 👉 "
                }
            } else {
                for (let res = ini; res >= f; res = res - pas) {
                    resp.innerHTML += res + " 👉 "
                }
            }
            resp.innerHTML += ' 🏁'
        }   
    </script>
</body>
</html>
